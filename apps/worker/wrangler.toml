name = "hyundai-kia-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "VEHICLE_TOKENS"
id = "PLACEHOLDER_VEHICLE_TOKENS_KV_ID"

[[kv_namespaces]]
binding = "USER_SESSIONS"
id = "PLACEHOLDER_USER_SESSIONS_KV_ID"

[vars]
EMAIL_FROM = "noreply@example.com"

[[email]]
binding = "EMAIL"
